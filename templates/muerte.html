<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL LOST — CRT SYSTEM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  :root { --red: #ff3333; --dim: #440000; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:#030000; color:#cc4444;
    font-family:'Share Tech Mono',monospace;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    flex-direction:column; text-align:center; padding:20px;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,50,50,0.02) 2px,rgba(255,50,50,0.02) 4px);
    pointer-events:none; z-index:9999;
  }
  .skull { font-size:80px; margin-bottom:20px; animation:shake .3s infinite; }
  @keyframes shake {
    0%,100%{transform:translate(0,0) rotate(0deg)}
    25%{transform:translate(-2px,1px) rotate(-1deg)}
    75%{transform:translate(2px,-1px) rotate(1deg)}
  }
  h1 { font-family:'Orbitron',sans-serif; font-size:36px; color:var(--red); letter-spacing:8px; margin-bottom:8px; text-shadow:0 0 30px rgba(255,50,50,0.8); }
  p { color:#884444; font-size:13px; letter-spacing:2px; margin-bottom:24px; }
  .btn {
    display:inline-block; padding:12px 28px; margin:6px;
    border:2px solid var(--red); background:transparent; color:var(--red);
    font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:4px;
    text-decoration:none; border-radius:2px; transition:all .2s;
  }
  .btn:hover { background:var(--red); color:#000; }
  .btn-green { border-color:#00aa2a; color:#00ff41; }
  .btn-green:hover { background:#00ff41; color:#000; }
</style>
</head>
<body>
  <div class="skull">MUERTE</div>
  <h1>SIGNAL LOST</h1>
  <p>[ UNIDAD DE SUPERVIVENCIA TERMINADA — PROTOCOLO C.R.T. ABORTADO ]</p>
  <div>
    <a href="{{ url_for('index') }}" class="btn btn-green">↺ REINICIAR PROTOCOLO</a>
    <a href="{{ url_for('leaderboard') }}" class="btn">📊 VER RANKING</a>
  </div>
</body>
</html>
